<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10b981;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background Shape -->
  <rect width="512" height="512" rx="110" fill="url(#grad1)"/>
  
  <!-- "D" shape + Growth Line -->
  <path d="M150 140 v232 q0 40 40 40 h80 q100 0 100 -136 t-100 -136 h-80 q-40 0 -40 40 z" fill="none" stroke="white" stroke-width="45" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Moving Up Arrow - More prominent -->
  <path d="M190 320 l70 -70 l50 50 l90 -90" fill="none" stroke="white" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M400 210 h-45 v45" fill="none" stroke="white" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Accent Dots (Dividends falling) -->
  <circle cx="220" cy="220" r="14" fill="white"/>
  <circle cx="280" cy="180" r="14" fill="white"/>
</svg>
